    - name: Check Brai API source directories before active-service restart
      ansible.builtin.stat:
        path: "{{ brai_env_root }}/{{ item.value.path }}/source/services/brai_api"
      loop: "{{ brai_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.value.service }}"
      register: brai_api_source_directories
