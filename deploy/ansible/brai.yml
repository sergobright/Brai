- name: Configure Brai one-VPS environments
  hosts: brai
  become: true
  tasks:
    - name: Create deploy user
      ansible.builtin.user:
        name: "{{ brai_deploy_user }}"
        shell: /bin/bash
        create_home: true

    - name: Create service group
      ansible.builtin.group:
        name: "{{ brai_service_group }}"
        system: true

    - name: Create service user
      ansible.builtin.user:
        name: "{{ brai_service_user }}"
        group: "{{ brai_service_group }}"
        shell: /usr/sbin/nologin
        create_home: false
        system: true

    - name: Allow service user to write deploy-owned runtime files
      ansible.builtin.user:
        name: "{{ brai_service_user }}"
        groups: "{{ brai_deploy_user }}"
        append: true

    - name: Allow local deploy writers to update environment files
      ansible.builtin.user:
        name: "{{ item }}"
        groups: "{{ brai_deploy_user }}"
        append: true
      loop: "{{ brai_deploy_writers }}"

    - name: Ensure protected Brai env directory contract
      ansible.builtin.file:
        path: "{{ brai_protected_env_dir }}"
        state: directory
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "0750"
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Check protected Brai env files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: brai_protected_env_files
      loop:
        - "{{ brai_api_env_source }}"
        - "{{ brai_supabase_deploy_env_source }}"
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Refuse to create protected Brai env files from source
      ansible.builtin.fail:
        msg: "{{ item.item }} is missing; create it on the server with secrets outside Git, then rerun this playbook."
      loop: "{{ brai_protected_env_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not item.stat.exists
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Ensure protected Brai env file permissions
      ansible.builtin.file:
        path: "{{ item.item }}"
        state: file
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "0640"
      loop: "{{ brai_protected_env_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Create environment root
      ansible.builtin.file:
        path: "{{ brai_env_root }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"

    - name: Keep locked main deployment scripts in source checkout group
      ansible.builtin.file:
        path: "{{ brai_repo }}/deploy/scripts"
        state: directory
        group: "{{ brai_source_group }}"
        mode: "0751"

    - name: Keep locked main environment map in source checkout group
      ansible.builtin.file:
        path: "{{ brai_repo }}/deploy/environments.json"
        state: file
        group: "{{ brai_source_group }}"
        mode: "0640"

    - name: Allow deploy user to enter Node.js runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "0755"
      loop:
        - "{{ brai_node_root }}"
        - "{{ brai_node_root }}/bin"

    - name: Keep Node.js library directories private to deploy group
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "0750"
      loop:
        - "{{ brai_node_root }}/lib"
        - "{{ brai_node_root }}/lib/node_modules"

    - name: Allow deploy user to execute Node.js binary
      ansible.builtin.file:
        path: "{{ brai_node_bin }}"
        state: file
        group: "{{ brai_deploy_user }}"
        mode: "0755"

    - name: Allow deploy user to read Node.js package manager files
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "u=rwX,g=rX,o="
        recurse: true
      loop:
        - "{{ brai_node_root }}/lib/node_modules/corepack"
        - "{{ brai_node_root }}/lib/node_modules/npm"

    - name: Ensure Syncthing apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Syncthing archive signing key
      ansible.builtin.get_url:
        url: https://syncthing.net/release-key.gpg
        dest: /etc/apt/keyrings/syncthing-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"

    - name: Install Syncthing apt source
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/syncthing.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [signed-by=/etc/apt/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable-v2

    - name: Prefer official Syncthing packages
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/syncthing.pref
        owner: root
        group: root
        mode: "0644"
        content: |
          Package: *
          Pin: origin apt.syncthing.net
          Pin-Priority: 990

    - name: Install Syncthing
      ansible.builtin.apt:
        name: syncthing
        state: present
        update_cache: true

    - name: Ensure Syncthing vault root is writable by sync group
      ansible.builtin.file:
        path: "{{ brai_syncthing_vault_path }}"
        state: directory
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "2770"

    - name: Ensure existing Syncthing vault contents are writable by sync group
      ansible.builtin.file:
        path: "{{ brai_syncthing_vault_path }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "u=rwX,g=rwX,o="
        recurse: true

    - name: Restore Syncthing vault root setgid mode
      ansible.builtin.file:
        path: "{{ brai_syncthing_vault_path }}"
        state: directory
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "2770"

    - name: Check Syncthing systemd service template
      ansible.builtin.stat:
        path: /usr/lib/systemd/system/syncthing@.service
      register: brai_syncthing_system_service

    - name: Enable Syncthing service
      ansible.builtin.systemd_service:
        name: "syncthing@{{ brai_syncthing_user }}.service"
        enabled: true
        state: started
      when: brai_syncthing_system_service.stat.exists

    - name: Allow Syncthing TCP sync port through ufw
      ansible.builtin.command:
        cmd: "ufw allow {{ brai_syncthing_sync_port }}/tcp"
      register: brai_syncthing_ufw_tcp
      changed_when: "'Rule added' in brai_syncthing_ufw_tcp.stdout or 'Rules updated' in brai_syncthing_ufw_tcp.stdout"
      when: not ansible_check_mode

    - name: Allow Syncthing UDP sync port through ufw
      ansible.builtin.command:
        cmd: "ufw allow {{ brai_syncthing_sync_port }}/udp"
      register: brai_syncthing_ufw_udp
      changed_when: "'Rule added' in brai_syncthing_ufw_udp.stdout or 'Rules updated' in brai_syncthing_ufw_udp.stdout"
      when: not ansible_check_mode

    - name: Create environment parent directories
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Create production source checkout path
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ brai_envs.prod.path }}/source"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"

    - name: Create environment directories
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.0.value.path }}/{{ item.1 }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list | product(['web', 'mobile-update', 'data', 'source']) | list }}"
      loop_control:
        label: "{{ item.0.key }}/{{ item.1 }}"

    - name: Ensure non-production deploy artifact ownership
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.0.value.path }}/{{ item.1 }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list | product(['web', 'mobile-update', 'data', 'source']) | list }}"
      loop_control:
        label: "{{ item.0.key }}/{{ item.1 }}"

    - name: Ensure non-production data directories keep deploy setgid
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}/data"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}/data"

    - name: Ensure nested non-production data directories keep deploy setgid
      ansible.builtin.command:
        argv:
          - find
          - "{{ brai_env_root }}/{{ item.value.path }}/data"
          - -type
          - d
          - -exec
          - chmod
          - "2775"
          - "{}"
          - "+"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}/data"
      changed_when: false
      when: not ansible_check_mode

    - name: Create preview slot status directory
      ansible.builtin.file:
        path: "{{ brai_env_root }}/preview-status"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"

    - name: Ensure public landing root exists
      ansible.builtin.file:
        path: "{{ brai_public_site_root }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "2775"

    - name: Allow deploy user to publish production web and OTA assets
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop:
        - "{{ brai_repo }}/deploy/web"
        - "{{ brai_repo }}/deploy/mobile-update"
        - "{{ brai_repo }}/deploy/releases"

    - name: Ensure production Brai data directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ brai_service_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop:
        - "{{ brai_repo }}/data"

    - name: Seed preview slot registry if missing
      ansible.builtin.command:
        cmd: "{{ brai_repo }}/deploy/scripts/preview-slots.sh init"
        creates: "{{ brai_env_root }}/preview-slots.json"

    - name: Ensure preview slot state ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0664"
      loop:
        - "{{ brai_env_root }}/preview-slots.json"
        - "{{ brai_env_root }}/preview-slots.lock"
      when: not ansible_check_mode

    - name: Ensure preview status ownership
      ansible.builtin.file:
        path: "{{ brai_env_root }}/preview-status"
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "u=rwX,g=rwX,o=rX"
        recurse: true
      when: not ansible_check_mode

    - name: Ensure per-environment Brai API env placeholders exist
      ansible.builtin.copy:
        content: |
          # Managed placeholder. CI replaces this with the environment Supabase branch DSN.
          # BRAI_DATABASE_URL is intentionally absent until branch setup succeeds.
        dest: "{{ brai_env_root }}/{{ item.value.path }}/brai-api.env"
        force: false
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0660"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}"
      when: not ansible_check_mode

    - name: Ensure per-environment Brai API env files are deploy-writable
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}/brai-api.env"
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0660"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}"
      when: not ansible_check_mode

    - name: Install Brai API systemd units
      ansible.builtin.template:
        src: templates/brai-api.service.j2
        dest: "/etc/systemd/system/{{ item.value.service }}"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ brai_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.value.service }}"
      notify: Reload systemd

    - name: Install Brai main checkout sync script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/sync-local-main-checkout.sh"
        dest: /srv/opt/brai-main-sync.sh
        owner: root
        group: root
        mode: "0755"

    - name: Validate generated Brai Caddy routes against current host config
      block:
        - name: Create temporary Caddy validation file
          ansible.builtin.tempfile:
            state: file
            suffix: .Caddyfile
          register: brai_caddy_validate_file
          changed_when: false

        - name: Copy current Caddyfile for managed block validation
          ansible.builtin.copy:
            src: "{{ brai_caddyfile }}"
            dest: "{{ brai_caddy_validate_file.path }}"
            remote_src: true
            mode: "0600"
          changed_when: false

        - name: Prune unmanaged Brai production Caddy routes in validation file
          ansible.builtin.command:
            argv:
              - "{{ brai_node_bin }}"
              - "{{ playbook_dir }}/../scripts/prune-caddy-site-blocks.mjs"
              - "--file"
              - "{{ brai_caddy_validate_file.path }}"
              - "--managed-marker"
              - "BRAI DEV/PREVIEW ENVIRONMENTS"
              - "--site"
              - "http://{{ brai_public_site_domain }}"
              - "--site"
              - "{{ brai_public_site_domain }}"
              - "--site"
              - "http://{{ brai_envs.prod.domain }}"
              - "--site"
              - "{{ brai_envs.prod.domain }}"
          changed_when: false

        - name: Validate generated Brai managed Caddy block
          ansible.builtin.blockinfile:
            path: "{{ brai_caddy_validate_file.path }}"
            marker: "# {mark} BRAI DEV/PREVIEW ENVIRONMENTS"
            block: "{{ lookup('template', 'templates/Caddyfile.j2') }}"
            validate: "caddy validate --adapter caddyfile --config %s"
          changed_when: false
      always:
        - name: Remove temporary Caddy validation file
          ansible.builtin.file:
            path: "{{ brai_caddy_validate_file.path }}"
            state: absent
          changed_when: false
          when: brai_caddy_validate_file.path is defined
      check_mode: false

    - name: Check unmanaged Brai production Caddy routes before managed install
      ansible.builtin.command:
        argv:
          - "{{ brai_node_bin }}"
          - "{{ playbook_dir }}/../scripts/prune-caddy-site-blocks.mjs"
          - "--file"
          - "{{ brai_caddyfile }}"
          - "--managed-marker"
          - "BRAI DEV/PREVIEW ENVIRONMENTS"
          - "--site"
          - "http://{{ brai_public_site_domain }}"
          - "--site"
          - "{{ brai_public_site_domain }}"
          - "--site"
          - "http://{{ brai_envs.prod.domain }}"
          - "--site"
          - "{{ brai_envs.prod.domain }}"
          - "--check"
      register: brai_caddy_prune_check
      changed_when: (brai_caddy_prune_check.stdout | from_json).changed
      check_mode: false
      when: ansible_check_mode

    - name: Remove unmanaged Brai production Caddy routes before managed install
      ansible.builtin.command:
        argv:
          - "{{ brai_node_bin }}"
          - "{{ playbook_dir }}/../scripts/prune-caddy-site-blocks.mjs"
          - "--file"
          - "{{ brai_caddyfile }}"
          - "--managed-marker"
          - "BRAI DEV/PREVIEW ENVIRONMENTS"
          - "--site"
          - "http://{{ brai_public_site_domain }}"
          - "--site"
          - "{{ brai_public_site_domain }}"
          - "--site"
          - "http://{{ brai_envs.prod.domain }}"
          - "--site"
          - "{{ brai_envs.prod.domain }}"
      register: brai_caddy_prune
      changed_when: (brai_caddy_prune.stdout | from_json).changed
      check_mode: false
      when: not ansible_check_mode
      notify:
        - Validate Caddy
        - Reload Caddy

    - name: Install Brai Caddy routes
      ansible.builtin.blockinfile:
        path: "{{ brai_caddyfile }}"
        marker: "# {mark} BRAI DEV/PREVIEW ENVIRONMENTS"
        block: "{{ lookup('template', 'templates/Caddyfile.j2') }}"
        validate: "caddy validate --adapter caddyfile --config %s"
      notify:
        - Validate Caddy
        - Reload Caddy

    - name: Install deploy user sudoers boundary
      ansible.builtin.template:
        src: templates/brai-deploy-sudoers.j2
        dest: /etc/sudoers.d/brai-deploy
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Validate Caddy
      ansible.builtin.command:
        cmd: "caddy validate --config {{ brai_caddyfile }}"
      changed_when: false

    - name: Reload Caddy
      ansible.builtin.systemd_service:
        name: caddy
        state: reloaded
