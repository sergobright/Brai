- name: Configure Brai one-VPS environments
  hosts: brai
  become: true
  tasks:
    - name: Create deploy user
      ansible.builtin.user:
        name: "{{ brai_deploy_user }}"
        shell: /bin/bash
        create_home: true

    - name: Create service group
      ansible.builtin.group:
        name: "{{ brai_service_group }}"
        system: true

    - name: Create Brai Goal agent group
      ansible.builtin.group:
        name: "{{ brai_goal_agent_group }}"
        system: true
      tags:
        - brai-goal-agents

    - name: Create Brai Codex executable group
      ansible.builtin.group:
        name: "{{ brai_codex_exec_group }}"
        system: true
      tags:
        - brai-goal-agents

    - name: Create Brai Codex auth group
      ansible.builtin.group:
        name: "{{ brai_codex_auth_group }}"
        system: true
      tags:
        - brai-goal-agents

    - name: Create service user
      ansible.builtin.user:
        name: "{{ brai_service_user }}"
        group: "{{ brai_service_group }}"
        shell: /usr/sbin/nologin
        create_home: false
        system: true

    - name: Create isolated Brai Goal agent user
      ansible.builtin.user:
        name: "{{ brai_goal_agent_user }}"
        group: "{{ brai_goal_agent_group }}"
        groups:
          - "{{ brai_codex_exec_group }}"
          - "{{ brai_codex_auth_group }}"
        append: false
        shell: /usr/sbin/nologin
        create_home: false
        system: true
      tags:
        - brai-goal-agents

    - name: Allow service user to write deploy-owned runtime files
      ansible.builtin.user:
        name: "{{ brai_service_user }}"
        groups: "{{ brai_deploy_user }}"
        append: true

    - name: Allow Brai API service to read Goal agent contracts and retain Codex access
      ansible.builtin.user:
        name: "{{ brai_service_user }}"
        groups:
          - "{{ brai_goal_agent_group }}"
          - "{{ brai_codex_exec_group }}"
          - "{{ brai_codex_auth_group }}"
        append: true
      when: not ansible_check_mode
      notify: Restart active Brai API services after Codex access change
      tags:
        - brai-goal-agents

    - name: Allow deploy user to publish Goal agent source and Codex executables
      ansible.builtin.user:
        name: "{{ brai_deploy_user }}"
        groups:
          - "{{ brai_goal_agent_group }}"
          - "{{ brai_codex_exec_group }}"
        append: true
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Allow local deploy writers to update environment files
      ansible.builtin.user:
        name: "{{ item }}"
        groups: "{{ brai_deploy_user }}"
        append: true
      loop: "{{ brai_deploy_writers }}"

    - name: Ensure protected Brai env directory contract
      ansible.builtin.file:
        path: "{{ brai_protected_env_dir }}"
        state: directory
        owner: root
        group: "{{ brai_deploy_user }}"
        # Service-specific env groups need pathname traversal, but only
        # brai-deploy may list the directory. Individual files remain 0640.
        mode: "0751"
      tags:
        - brai-goal-agents
        - brai-env-contract
        - targeted-infra-apply

    - name: Check protected Brai env files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: brai_protected_env_files
      loop:
        - "{{ brai_api_env_source }}"
        - "{{ brai_supabase_deploy_env_source }}"
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Refuse to create protected Brai env files from source
      ansible.builtin.fail:
        msg: "{{ item.item }} is missing; create it on the server with secrets outside Git, then rerun this playbook."
      loop: "{{ brai_protected_env_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not item.stat.exists
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Ensure protected Brai env file permissions
      ansible.builtin.file:
        path: "{{ item.item }}"
        state: file
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "0640"
      loop: "{{ brai_protected_env_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Check Brai DB Telegram backup env file exists
      ansible.builtin.stat:
        path: "{{ brai_db_telegram_backup_env_source }}"
      register: brai_db_telegram_backup_env_file
      tags:
        - brai-db-backup
        - targeted-infra-apply

    - name: Refuse to create Brai DB Telegram backup secrets from source
      ansible.builtin.fail:
        msg: "{{ brai_db_telegram_backup_env_source }} is missing; create it on the server with TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID outside Git, then rerun this playbook."
      when: not brai_db_telegram_backup_env_file.stat.exists
      tags:
        - brai-db-backup
        - targeted-infra-apply

    - name: Ensure Brai DB Telegram backup env file permissions
      ansible.builtin.file:
        path: "{{ brai_db_telegram_backup_env_source }}"
        state: file
        owner: root
        group: root
        mode: "0600"
      when: brai_db_telegram_backup_env_file.stat.exists
      tags:
        - brai-db-backup
        - targeted-infra-apply

    - name: Check Brai DB Telegram backup encryption key exists
      ansible.builtin.stat:
        path: "{{ brai_db_telegram_backup_key_source }}"
      register: brai_db_telegram_backup_key_file
      tags:
        - brai-db-backup
        - targeted-infra-apply

    - name: Refuse to create Brai DB Telegram backup encryption key from source
      ansible.builtin.fail:
        msg: "{{ brai_db_telegram_backup_key_source }} is missing; create it on the server outside Git before enabling Telegram DB backups."
      when: not brai_db_telegram_backup_key_file.stat.exists
      tags:
        - brai-db-backup
        - targeted-infra-apply

    - name: Ensure Brai DB Telegram backup encryption key permissions
      ansible.builtin.file:
        path: "{{ brai_db_telegram_backup_key_source }}"
        state: file
        owner: root
        group: root
        mode: "0600"
      when: brai_db_telegram_backup_key_file.stat.exists
      tags:
        - brai-db-backup
        - targeted-infra-apply

    - name: Check Brai Temporal worker secret reference files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: brai_temporal_secret_ref_files
      loop:
        - "{{ brai_temporal_deploy_ssh_key_path }}"
        - "{{ brai_temporal_github_token_path }}"
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Refuse to create Brai Temporal worker secrets from source
      ansible.builtin.fail:
        msg: "{{ item.item }} is missing; create it on the server outside Git, then rerun this playbook."
      loop: "{{ brai_temporal_secret_ref_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not item.stat.exists
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Ensure Brai Temporal worker secret reference permissions
      ansible.builtin.file:
        path: "{{ item.item }}"
        state: file
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "0640"
      loop: "{{ brai_temporal_secret_ref_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Install Brai Temporal worker environment contract
      ansible.builtin.template:
        src: templates/brai-temporal-worker.env.j2
        dest: "{{ brai_temporal_worker_env_source }}"
        owner: root
        group: "{{ brai_deploy_user }}"
        mode: "0640"
      notify: Restart Brai Temporal worker
      tags:
        - brai-env-contract
        - targeted-infra-apply

    - name: Check shared Brai Codex auth files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: brai_codex_auth_files
      loop:
        - "{{ brai_codex_auth_root }}/auth.json"
        - "{{ brai_codex_auth_root }}/config.toml"
      tags:
        - brai-goal-agents

    - name: Refuse to provision Goal agents without shared Codex auth files
      ansible.builtin.fail:
        msg: "{{ item.item }} is missing; provision Codex auth outside Git before installing Goal agents."
      loop: "{{ brai_codex_auth_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not item.stat.exists
      tags:
        - brai-goal-agents

    - name: Isolate shared Brai Codex auth directory
      ansible.builtin.file:
        path: "{{ brai_codex_auth_root }}"
        state: directory
        group: "{{ brai_codex_auth_group }}"
        mode: "0750"
      when: not ansible_check_mode
      notify: Restart active Brai API services after Codex access change
      tags:
        - brai-goal-agents

    - name: Grant only Brai Codex auth readers access to shared credentials
      ansible.builtin.file:
        path: "{{ item }}"
        state: file
        owner: root
        group: "{{ brai_codex_auth_group }}"
        mode: "0640"
      loop:
        - "{{ brai_codex_auth_root }}/auth.json"
        - "{{ brai_codex_auth_root }}/config.toml"
      when: not ansible_check_mode
      notify: Restart active Brai API services after Codex access change
      tags:
        - brai-goal-agents

    - name: Create isolated Brai Goal agent Codex home
      ansible.builtin.file:
        path: "{{ brai_goal_agent_codex_home }}"
        state: directory
        owner: "{{ brai_goal_agent_user }}"
        group: "{{ brai_goal_agent_group }}"
        mode: "0700"
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Link isolated Goal agent Codex home to read-only shared auth
      ansible.builtin.file:
        src: "{{ brai_codex_auth_root }}/{{ item }}"
        dest: "{{ brai_goal_agent_codex_home }}/{{ item }}"
        state: link
        follow: false
        owner: "{{ brai_goal_agent_user }}"
        group: "{{ brai_goal_agent_group }}"
        force: true
      loop:
        - auth.json
        - config.toml
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Install Brai Goal agent environment contract
      ansible.builtin.template:
        src: templates/brai-goal-agents.env.j2
        dest: "{{ brai_goal_agents_env_source }}"
        owner: root
        group: "{{ brai_goal_agent_group }}"
        mode: "0640"
      when: not ansible_check_mode
      tags:
        - brai-env-contract
        - brai-goal-agents
        - targeted-infra-apply

    - name: Create environment root
      ansible.builtin.file:
        path: "{{ brai_env_root }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"

    - name: Keep locked main deployment scripts in source checkout group
      ansible.builtin.file:
        path: "{{ brai_repo }}/deploy/scripts"
        state: directory
        group: "{{ brai_source_group }}"
        mode: "0751"

    - name: Keep locked main environment map in source checkout group
      ansible.builtin.file:
        path: "{{ brai_repo }}/deploy/environments.json"
        state: file
        group: "{{ brai_source_group }}"
        mode: "0640"

    - name: Allow deploy user to enter Node.js runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "0755"
      loop:
        - "{{ brai_node_root }}"
        - "{{ brai_node_root }}/bin"

    - name: Keep Node.js library directories private to Codex executable readers
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_codex_exec_group }}"
        mode: "0750"
      loop:
        - "{{ brai_node_root }}/lib"
        - "{{ brai_node_root }}/lib/node_modules"
      when: not ansible_check_mode
      notify: Restart active Brai API services after Codex access change
      tags:
        - brai-goal-agents

    - name: Allow deploy user to execute Node.js binary
      ansible.builtin.file:
        path: "{{ brai_node_bin }}"
        state: file
        group: "{{ brai_deploy_user }}"
        mode: "0755"

    - name: Allow deploy user to read Node.js package manager files
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ brai_deploy_user }}"
        mode: "u=rwX,g=rX,o="
        recurse: true
      loop:
        - "{{ brai_node_root }}/lib/node_modules/corepack"
        - "{{ brai_node_root }}/lib/node_modules/npm"

    - name: Check Codex CLI package exists
      ansible.builtin.stat:
        path: "{{ brai_node_root }}/lib/node_modules/@openai/codex"
      register: brai_codex_package
      tags:
        - brai-goal-agents

    - name: Refuse to provision Goal agents without Codex CLI package
      ansible.builtin.fail:
        msg: "{{ brai_node_root }}/lib/node_modules/@openai/codex is missing; install Codex CLI before Goal agents."
      when: not brai_codex_package.stat.exists
      tags:
        - brai-goal-agents

    - name: Allow Codex executable readers to enter scoped package directory
      ansible.builtin.file:
        path: "{{ brai_node_root }}/lib/node_modules/@openai"
        state: directory
        group: "{{ brai_codex_exec_group }}"
        mode: "0750"
      when: not ansible_check_mode
      notify: Restart active Brai API services after Codex access change
      tags:
        - brai-goal-agents

    - name: Grant read and execute access only to the Codex CLI package
      ansible.builtin.file:
        path: "{{ brai_node_root }}/lib/node_modules/@openai/codex"
        state: directory
        group: "{{ brai_codex_exec_group }}"
        mode: "u=rwX,g=rX,o="
        recurse: true
      when: not ansible_check_mode
      notify: Restart active Brai API services after Codex access change
      tags:
        - brai-goal-agents

    - name: Install Goal agent runtime preparation helper
      ansible.builtin.template:
        src: templates/brai-goal-agent-runtime-prepare.sh.j2
        dest: "{{ brai_goal_agent_runtime_prepare }}"
        owner: root
        group: root
        mode: "0755"
        validate: "/bin/bash -n %s"
      tags:
        - brai-goal-agents

    - name: Prepare and verify Goal agent Codex runtime access
      ansible.builtin.command:
        argv:
          - "{{ brai_goal_agent_runtime_prepare }}"
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Check managed Codex release sync helper
      ansible.builtin.stat:
        path: "{{ brai_codex_maintenance_sync }}"
      register: brai_codex_maintenance_sync_file
      tags:
        - brai-goal-agents

    - name: Refuse Goal agent runtime without managed Codex release sync
      ansible.builtin.fail:
        msg: "{{ brai_codex_maintenance_sync }} is missing; restore Codex maintenance before Goal agents."
      when: not brai_codex_maintenance_sync_file.stat.exists
      tags:
        - brai-goal-agents

    - name: Reconcile Goal agent access after every managed Codex update
      ansible.builtin.blockinfile:
        path: "{{ brai_codex_maintenance_sync }}"
        marker: "# {mark} BRAI GOAL AGENT CODEX ACCESS"
        insertafter: EOF
        block: |
          /usr/bin/sudo -n {{ brai_goal_agent_runtime_prepare }}
        validate: "/bin/bash -n %s"
      when: brai_codex_maintenance_sync_file.stat.exists
      tags:
        - brai-goal-agents

    - name: Ensure Syncthing apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Syncthing archive signing key
      ansible.builtin.get_url:
        url: https://syncthing.net/release-key.gpg
        dest: /etc/apt/keyrings/syncthing-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"

    - name: Install Syncthing apt source
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/syncthing.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [signed-by=/etc/apt/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable-v2

    - name: Prefer official Syncthing packages
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/syncthing.pref
        owner: root
        group: root
        mode: "0644"
        content: |
          Package: *
          Pin: origin apt.syncthing.net
          Pin-Priority: 990

    - name: Install Syncthing
      ansible.builtin.apt:
        name: syncthing
        state: present
        update_cache: true

    - name: Ensure Syncthing vault root is writable by sync group
      ansible.builtin.file:
        path: "{{ brai_syncthing_vault_path }}"
        state: directory
        owner: "{{ brai_syncthing_user }}"
        group: "{{ brai_source_group }}"
        mode: "2770"
      tags: [brai-vault]

    - name: Ensure existing Syncthing vault contents are writable by sync group
      ansible.builtin.file:
        path: "{{ brai_syncthing_vault_path }}"
        state: directory
        owner: "{{ brai_syncthing_user }}"
        group: "{{ brai_source_group }}"
        mode: "u=rwX,g=rwX,o="
        recurse: true
      tags: [brai-vault]

    - name: Ensure existing Syncthing vault directories keep sync setgid
      ansible.builtin.command:
        argv:
          - find
          - "{{ brai_syncthing_vault_path }}"
          - -type
          - d
          - -exec
          - chmod
          - "2770"
          - "{}"
          - "+"
      changed_when: false
      when: not ansible_check_mode
      tags: [brai-vault]

    - name: Restore Syncthing vault root setgid mode
      ansible.builtin.file:
        path: "{{ brai_syncthing_vault_path }}"
        state: directory
        owner: "{{ brai_syncthing_user }}"
        group: "{{ brai_source_group }}"
        mode: "2770"
      tags: [brai-vault]

    - name: Check Syncthing systemd service template
      ansible.builtin.stat:
        path: /usr/lib/systemd/system/syncthing@.service
      register: brai_syncthing_system_service

    - name: Ensure Syncthing service override directory
      ansible.builtin.file:
        path: "/etc/systemd/system/syncthing@{{ brai_syncthing_user }}.service.d"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure Syncthing keeps shared Vault files group-writable
      ansible.builtin.copy:
        dest: "/etc/systemd/system/syncthing@{{ brai_syncthing_user }}.service.d/brai-vault.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Service]
          UMask=0007
      notify:
        - Restart Syncthing

    - name: Enable Syncthing service
      ansible.builtin.systemd_service:
        name: "syncthing@{{ brai_syncthing_user }}.service"
        enabled: true
        state: started
      when: brai_syncthing_system_service.stat.exists

    - name: Allow Syncthing TCP sync port through ufw
      ansible.builtin.command:
        cmd: "ufw allow {{ brai_syncthing_sync_port }}/tcp"
      register: brai_syncthing_ufw_tcp
      changed_when: "'Rule added' in brai_syncthing_ufw_tcp.stdout or 'Rules updated' in brai_syncthing_ufw_tcp.stdout"
      when: not ansible_check_mode

    - name: Allow Syncthing UDP sync port through ufw
      ansible.builtin.command:
        cmd: "ufw allow {{ brai_syncthing_sync_port }}/udp"
      register: brai_syncthing_ufw_udp
      changed_when: "'Rule added' in brai_syncthing_ufw_udp.stdout or 'Rules updated' in brai_syncthing_ufw_udp.stdout"
      when: not ansible_check_mode

    - name: Create environment parent directories
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.key }}"
      tags:
        - brai-storage-maintenance
        - targeted-infra-apply

    - name: Create production source checkout path
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ brai_envs.prod.path }}/source"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"

    - name: Create environment directories
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.0.value.path }}/{{ item.1 }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list | product(['web', 'mobile-update', 'data', 'source']) | list }}"
      loop_control:
        label: "{{ item.0.key }}/{{ item.1 }}"

    - name: Provision deploy-owned source operation locks
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}/.source-operation.lock"
        state: touch
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0664"
        access_time: preserve
        modification_time: preserve
      loop: "{{ brai_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.key }}"
      tags:
        - brai-storage-maintenance
        - targeted-infra-apply

    - name: Install inert Brai auth host bootstrap
      ansible.builtin.import_tasks: tasks/brai-auth-bootstrap.yml
      tags: [brai-auth-bootstrap]

    - name: Create CI upload root
      ansible.builtin.file:
        path: "{{ brai_env_root }}/ci-uploads"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      tags:
        - brai-storage-maintenance
        - targeted-infra-apply

    - name: Provision deploy-owned staging operation lock
      ansible.builtin.file:
        path: "{{ brai_env_root }}/ci-uploads/.staging-operation.lock"
        state: touch
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0664"
        access_time: preserve
        modification_time: preserve
      tags:
        - brai-storage-maintenance
        - targeted-infra-apply

    - name: Ensure non-production deploy artifact ownership
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.0.value.path }}/{{ item.1 }}"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
        recurse: true
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list | product(['web', 'mobile-update', 'data', 'source']) | list }}"
      loop_control:
        label: "{{ item.0.key }}/{{ item.1 }}"

    - name: Ensure non-production data directories keep deploy setgid
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}/data"
        state: directory
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "2775"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}/data"

    - name: Ensure nested non-production data directories keep deploy setgid
      ansible.builtin.command:
        argv:
          - find
          - "{{ brai_env_root }}/{{ item.value.path }}/data"
          - -type
          - d
          - -exec
          - chmod
          - "2775"
          - "{}"
          - "+"
