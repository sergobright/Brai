    - name: Install environment-qualified Brai Goal agent systemd units
      ansible.builtin.template:
        src: templates/brai-goal-agent.service.j2
        dest: "/etc/systemd/system/{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ brai_envs | dict2items | product(brai_goal_agents | dict2items) | list }}"
      loop_control:
        label: "{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      notify: Reload systemd
      tags:
        - brai-goal-agents

    - name: Reload systemd before Goal agent identity verification
      ansible.builtin.meta: flush_handlers
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Read Brai API service UID
      ansible.builtin.command:
        argv:
          - /usr/bin/id
          - -u
          - "{{ brai_service_user }}"
      register: brai_api_effective_uid
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Read effective Brai Goal agent UID through sudo
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/id
          - -u
      register: brai_goal_agent_effective_uid
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Read effective Brai Goal agent groups through sudo
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/id
          - -Gn
      register: brai_goal_agent_effective_groups
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert isolated Brai Goal agent effective identity
      ansible.builtin.assert:
        that:
          - brai_goal_agent_effective_uid.stdout != brai_api_effective_uid.stdout
          - (brai_goal_agent_effective_groups.stdout.split() | sort) == ([brai_goal_agent_group, brai_codex_exec_group, brai_codex_auth_group] | sort)
          - brai_service_group not in brai_goal_agent_effective_groups.stdout.split()
          - brai_deploy_user not in brai_goal_agent_effective_groups.stdout.split()
        fail_msg: "Brai Goal agent effective UID/groups violate the API/deploy isolation contract."
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert Brai Goal agent cannot read API secrets
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/test
          - "!"
          - -r
          - "{{ brai_api_env_source }}"
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert Brai Goal agent can read only its environment contract
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/test
          - -r
          - "{{ brai_goal_agents_env_source }}"
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert Brai Goal agent cannot list protected env directory
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/test
          - "!"
          - -r
          - "{{ brai_protected_env_dir }}"
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert Brai Goal agent can start Codex CLI
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/env
          - "CODEX_HOME={{ brai_goal_agent_codex_home }}"
          - "HOME={{ brai_goal_agent_codex_home }}"
          - "{{ brai_codex_bin }}"
          - --version
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert Brai Goal agent can read shared Codex auth
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -u
          - "{{ brai_goal_agent_user }}"
          - --
          - /usr/bin/test
          - -r
          - "{{ brai_goal_agent_codex_home }}/auth.json"
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Read installed Brai Goal agent unit users
      ansible.builtin.command:
        argv:
          - /bin/systemctl
          - show
          - --property=User
          - --value
          - "{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      loop: "{{ brai_envs | dict2items | product(brai_goal_agents | dict2items) | list }}"
      loop_control:
        label: "{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      register: brai_goal_agent_unit_users
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Read installed Brai Goal agent unit groups
      ansible.builtin.command:
        argv:
          - /bin/systemctl
          - show
          - --property=Group
          - --value
          - "{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      loop: "{{ brai_envs | dict2items | product(brai_goal_agents | dict2items) | list }}"
      loop_control:
        label: "{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      register: brai_goal_agent_unit_groups
      changed_when: false
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Assert all Brai Goal agent units use the isolated identity
      ansible.builtin.assert:
        that:
          - (brai_goal_agent_unit_users.results | map(attribute='stdout') | unique | list) == [brai_goal_agent_user]
          - (brai_goal_agent_unit_groups.results | map(attribute='stdout') | unique | list) == [brai_goal_agent_group]
        fail_msg: "At least one Goal agent systemd unit is not bound to the isolated Unix identity."
      when: not ansible_check_mode
      tags:
        - brai-goal-agents

    - name: Verify installed Brai Goal agent systemd units
      ansible.builtin.command:
        argv:
          - /usr/bin/systemd-analyze
          - verify
          - "/etc/systemd/system/{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      loop: "{{ brai_envs | dict2items | product(brai_goal_agents | dict2items) | list }}"
      loop_control:
        label: "{{ item.1.value.unit_base }}{{ item.0.value.goal_agent_service_suffix }}.service"
      changed_when: false
