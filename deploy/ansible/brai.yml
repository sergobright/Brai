        dest: "{{ brai_env_root }}/{{ item.value.path }}/brai-api.env"
        force: false
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0660"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}"
      when: not ansible_check_mode

    - name: Ensure per-environment Brai API env files are deploy-writable
      ansible.builtin.file:
        path: "{{ brai_env_root }}/{{ item.value.path }}/brai-api.env"
        owner: "{{ brai_deploy_user }}"
        group: "{{ brai_deploy_user }}"
        mode: "0660"
      loop: "{{ brai_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}"
