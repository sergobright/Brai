    - name: Install Brai Caddy routes
      ansible.builtin.blockinfile:
        path: "{{ brai_caddyfile }}"
        marker: "# {mark} BRAI DEV/PREVIEW ENVIRONMENTS"
        block: "{{ lookup('template', 'templates/Caddyfile.j2') }}"
        validate: "caddy validate --adapter caddyfile --config %s"
      notify:
        - Validate Caddy
        - Reload Caddy
      tags:
        - brai-caddy
        - brai-auth-bootstrap

    - name: Install deploy user sudoers boundary
      ansible.builtin.template:
        src: templates/brai-deploy-sudoers.j2
        dest: /etc/sudoers.d/brai-deploy
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
      tags:
        - brai-caddy
        - brai-goal-agents
        - brai-storage-maintenance
        - brai-supavisor-maintenance
        - targeted-infra-apply

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Restart active Brai API services after Codex access change
      ansible.builtin.command:
        argv:
          - /bin/systemctl
          - try-restart
          - "{{ item.item.value.service }}"
      loop: "{{ brai_api_source_directories.results | default([]) }}"
      loop_control:
        label: "{{ item.item.value.service }}"
      when: item.stat.exists
      changed_when: true

    - name: Validate Caddy
      ansible.builtin.command:
        cmd: "caddy validate --config {{ brai_caddyfile }}"
      changed_when: false
      tags: [brai-caddy]

    - name: Reload Caddy
      ansible.builtin.systemd_service:
        name: caddy
        state: reloaded
      tags: [brai-caddy]

    - name: Restart Brai Temporal worker
      ansible.builtin.systemd_service:
        name: brai-temporal-worker.service
        state: restarted

    - name: Restart Syncthing
      ansible.builtin.systemd_service:
        name: "syncthing@{{ brai_syncthing_user }}.service"
        daemon_reload: true
        state: restarted
      tags: [brai-vault]
