brai_repo: /srv/projects/brai
brai_env_root: /srv/projects/brai-envs
brai_node_root: /srv/opt/node-v22.16.0
brai_node_bin: /srv/opt/node-v22.16.0/bin/node
brai_caddyfile: /etc/caddy/Caddyfile
brai_public_site_domain: brai.one
brai_public_site_legacy_domains:
  - brightos.world
brai_github_repository: sergobright/Brai
brai_public_site_root: "{{ brai_repo }}/deploy/site"
brai_adr_domain: adr.brai.one
brai_adr_legacy_domains: []
brai_adr_root: "{{ brai_env_root }}/prod/adr"
brai_syncthing_domain: sync.brai.one
brai_syncthing_legacy_domains:
  - sync.brightos.world
brai_syncthing_gui_port: 8384
brai_syncthing_sync_port: 22000
brai_supabase_studio_domain: supabase.brai.one
brai_supabase_studio_legacy_domains:
  - supabase.brightos.world
brai_supabase_studio_port: 54323
brai_syncthing_user: mark
brai_syncthing_vault_path: /srv/projects/brai/vault
brai_deploy_user: brai-deploy
brai_deploy_writers: []
brai_operation_maintainers:
  - mark
brai_source_group: mark
brai_service_user: brai
brai_service_group: brai
brai_protected_env_dir: /etc/brai
brai_api_env_source: /etc/brai/brai-api.env
brai_db_telegram_backup_env_source: /etc/brai/brai-db-telegram-backup.env
brai_db_telegram_backup_key_source: /etc/brai/brai-db-telegram-backup.key
brai_api_domain: api.brai.one
brai_api_legacy_domains:
  - api.brightos.world
brai_supabase_deploy_env_source: /etc/brai/supabase-deploy.env
brai_temporal_worker_env_source: /etc/brai/brai-temporal-worker.env
brai_temporal_ui_domain: temporal.brai.one
brai_temporal_ui_legacy_domains:
  - temporal.brightos.world
brai_temporal_deploy_host: 127.0.0.1
brai_temporal_ui_port: 8233
brai_temporal_deploy_ssh_port: 22
brai_temporal_local_port: 17233
brai_temporal_deploy_ssh_key_path: /etc/brai/brai-temporal-deploy-ssh-key
brai_temporal_github_token_path: /etc/brai/brai-temporal-github-token
brai_basic_auth_directive: "import brai_unified_basic_auth"
