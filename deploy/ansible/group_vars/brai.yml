brai_supabase_maintenance: /srv/opt/brai-supabase-maintenance.sh
brai_temporal_worker_env_source: /etc/brai/brai-temporal-worker.env
brai_temporal_ui_domain: temporal.brai.one
brai_temporal_ui_legacy_domains:
  - temporal.brightos.world
brai_temporal_deploy_host: 127.0.0.1
brai_temporal_ui_port: 8233
brai_temporal_deploy_ssh_port: 22
brai_temporal_local_port: 17233
brai_temporal_deploy_ssh_key_path: /etc/brai/brai-temporal-deploy-ssh-key
brai_temporal_github_token_path: /etc/brai/brai-temporal-github-token
brai_goal_agents_env_source: /etc/brai/brai-goal-agents.env
brai_goal_agents:
  activity-classifier:
    id: activity.classifier
    unit_base: brai-agent-activity-classifier
    queue_base: brai-agent-activity-classifier
    entrypoint: activity-classifier.mjs
  goal-item-matcher:
    id: goal.item-matcher
    unit_base: brai-agent-goal-item-matcher
    queue_base: brai-agent-goal-item-matcher
    entrypoint: goal-item-matcher.mjs
  goal-member-finder:
    id: goal.member-finder
    unit_base: brai-agent-goal-member-finder
    queue_base: brai-agent-goal-member-finder
    entrypoint: goal-member-finder.mjs
  goal-discovery:
    id: goal.discovery
    unit_base: brai-agent-goal-discovery
    queue_base: brai-agent-goal-discovery
    entrypoint: goal-discovery.mjs
  goal-planner:
    id: goal.planner
    unit_base: brai-agent-goal-planner
    queue_base: brai-agent-goal-planner
    entrypoint: goal-planner.mjs
brai_basic_auth_directive: "import brai_unified_basic_auth"
