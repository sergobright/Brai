name: Brai delivery

on:
  push:
    branches:
      - main
      - dev
      - 'codex/**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
  delete:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Optional codex/* branch whose preview slot should be released'
        required: false
        type: string

env:
  BRAI_TEMPORAL_REQUIRED: 'true'

jobs:
  public-guard:
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-public-branch.mjs

  classify-delivery:
    needs: public-guard
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    outputs:
      delivery_class: ${{ steps.classify.outputs.delivery_class }}
      requires_preview: ${{ steps.classify.outputs.requires_preview }}
      requires_dev_deploy: ${{ steps.classify.outputs.requires_dev_deploy }}
      auto_merge: ${{ steps.classify.outputs.auto_merge }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: git fetch origin +refs/heads/main:refs/remotes/origin/main
      - id: classify
        continue-on-error: true
        run: node deploy/scripts/classify-delivery.mjs --github-output "$GITHUB_OUTPUT"
      - name: Temporal delivery classification failed
        if: steps.classify.outcome == 'failure' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event delivery_classification_failed --source classify-delivery
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
      - name: Fail closed after delivery classification failure
        if: steps.classify.outcome == 'failure'
        run: exit 1
      - name: Temporal delivery classified
        if: steps.classify.outcome == 'success' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event delivery_classified --delivery-class "$BRAI_DELIVERY_CLASS" --source classify-delivery
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_DELIVERY_CLASS: ${{ steps.classify.outputs.delivery_class }}
      - name: Temporal no preview required
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/') && steps.classify.outputs.auto_merge == 'true' && steps.classify.outputs.requires_preview == 'false'
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event no_preview_required --delivery-class "$BRAI_DELIVERY_CLASS" --source classify-delivery
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_DELIVERY_CLASS: ${{ steps.classify.outputs.delivery_class }}

  checks:
    needs:
      - public-guard
      - classify-delivery
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: brai_test
          POSTGRES_USER: brai
          POSTGRES_PASSWORD: brai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Temporal preview branch pushed
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event branch_pushed --source github-checks
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
      - name: Temporal checks started
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event checks_started --source github-checks
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
      - run: npm ci
      - run: npm --prefix apps/brai_app ci
      - run: npm --prefix services/brai_api ci
      - run: npm --prefix admin ci
      - run: node --test scripts/*.test.mjs deploy/scripts/*.test.mjs
      - run: npm --prefix apps/brai_app run lint
      - run: npm --prefix apps/brai_app run test -- --fileParallelism=false
      - run: scripts/brai-api-test.sh
        env:
          BRAI_TEST_DATABASE_URL: postgres://brai:brai@127.0.0.1:5432/brai_test
      - run: npm --prefix admin run lint
      - run: npm --prefix admin run self-check
        env:
          BRAI_TEST_DATABASE_URL: postgres://brai:brai@127.0.0.1:5432/brai_test
      - run: npm --prefix admin run build
      - name: Temporal checks passed
        if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event checks_passed --source github-checks
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
      - name: Temporal checks failed
        if: failure() && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --event checks_failed --source github-checks
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}

  temporal-worker-check:
    needs: public-guard
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/brai_temporal/package-lock.json
      - run: npm --prefix services/brai_temporal ci
      - run: npm --prefix services/brai_temporal test

  deploy-preview:
    needs:
      - classify-delivery
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/') && needs['classify-delivery'].outputs.requires_preview == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/brai_temporal/package-lock.json
      - name: Temporal preview deploy
        run: deploy/scripts/ci-temporal-signal.sh dispatch-preview-deploy --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --base-sha "$BRAI_BASE_COMMIT" --source deploy-preview
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_BASE_COMMIT: ${{ github.event.before }}

  auto-merge-infra-docs:
    needs:
      - classify-delivery
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/') && needs['classify-delivery'].outputs.auto_merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Temporal no-preview handoff
        run: deploy/scripts/ci-temporal-signal.sh dispatch-no-preview-handoff --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --delivery-class "$BRAI_DELIVERY_CLASS" --source auto-merge-infra-docs
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.ref_name }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_DELIVERY_CLASS: ${{ needs.classify-delivery.outputs.delivery_class }}

  deploy-prod:
    needs:
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/brai_temporal/package-lock.json
      - id: temporal_worker_restart
        run: |
          if git diff --quiet "$BRAI_BASE_COMMIT" "$BRAI_COMMIT" -- services/brai_temporal/package.json services/brai_temporal/package-lock.json; then
            echo "install_dependencies=false" >>"$GITHUB_OUTPUT"
          else
            echo "install_dependencies=true" >>"$GITHUB_OUTPUT"
          fi
          if git diff --quiet "$BRAI_BASE_COMMIT" "$BRAI_COMMIT" -- services/brai_temporal deploy/systemd/brai-temporal-worker.service; then
            echo "restart=false" >>"$GITHUB_OUTPUT"
          else
            echo "restart=true" >>"$GITHUB_OUTPUT"
          fi
        env:
          BRAI_BASE_COMMIT: ${{ github.event.before }}
          BRAI_COMMIT: ${{ github.sha }}
      - name: Bootstrap Temporal worker for orchestration changes
        if: steps.temporal_worker_restart.outputs.restart == 'true'
        run: |
          deploy/scripts/ci-ssh-sync-main-checkout.sh
          sleep 20
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_RESTART_TEMPORAL_WORKER: 'true'
          BRAI_INSTALL_TEMPORAL_DEPENDENCIES: ${{ steps.temporal_worker_restart.outputs.install_dependencies }}
          BRAI_TEMPORAL_WORKER_RESTART_DELAY: '1'
      - name: Temporal prod deploy
        run: deploy/scripts/ci-temporal-signal.sh dispatch-promotion --target prod --sha "$BRAI_COMMIT" --base-sha "$BRAI_BASE_COMMIT" --restart-temporal-worker "$BRAI_RESTART_TEMPORAL_WORKER" --source deploy-prod
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_BASE_COMMIT: ${{ github.event.before }}
          BRAI_RESTART_TEMPORAL_WORKER: ${{ steps.temporal_worker_restart.outputs.restart }}

  deploy-dev:
    needs:
      - classify-delivery
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs['classify-delivery'].outputs.requires_dev_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/brai_temporal/package-lock.json
      - name: Temporal dev deploy
        run: deploy/scripts/ci-temporal-signal.sh dispatch-promotion --target dev --sha "$BRAI_COMMIT" --base-sha "$BRAI_BASE_COMMIT" --source deploy-dev
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_COMMIT: ${{ github.sha }}
          BRAI_BASE_COMMIT: ${{ github.event.before }}

  record-infra-docs-merge:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'codex/') && (contains(toJson(github.event.pull_request.labels), 'brai-delivery:infra-docs') || contains(toJson(github.event.pull_request.labels), 'brai-delivery:technical-no-preview'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/brai_temporal/package-lock.json
      - name: Temporal no-preview merged
        run: |
          test -n "$BRAI_PR_MERGED_AT"
          deploy/scripts/ci-temporal-signal.sh dispatch-no-preview-merged --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --delivery-class "$BRAI_DELIVERY_CLASS" --pr-number "$BRAI_PR_NUMBER" --pr-url "$BRAI_PR_URL" --merged-at "$BRAI_PR_MERGED_AT" --source record-infra-docs-merge
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ github.event.pull_request.head.ref }}
          BRAI_COMMIT: ${{ github.event.pull_request.head.sha }}
          BRAI_PR_NUMBER: ${{ github.event.pull_request.number }}
          BRAI_PR_URL: ${{ github.event.pull_request.html_url }}
          BRAI_PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          BRAI_DELIVERY_CLASS: ${{ contains(toJson(github.event.pull_request.labels), 'brai-delivery:technical-no-preview') && 'technical-no-preview' || 'infra-docs' }}

  release-preview-slot:
    if: |
      (github.event_name == 'delete' && github.event.ref_type == 'branch' && startsWith(github.event.ref, 'codex/')) ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false && startsWith(github.event.pull_request.head.ref, 'codex/')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_branch, 'codex/'))
    runs-on: ubuntu-latest
    env:
      BRAI_RELEASE_BRANCH: ${{ inputs.release_branch || github.event.pull_request.head.ref || github.head_ref || github.event.ref }}
      BRAI_RELEASE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/brai_temporal/package-lock.json
      - name: Temporal preview release
        run: deploy/scripts/ci-temporal-signal.sh dispatch-release-preview --branch "$BRAI_BRANCH" --sha "$BRAI_COMMIT" --require-release "$BRAI_REQUIRE_RELEASE" --close-outcome "$BRAI_CLOSE_OUTCOME" --source release-preview-slot
        env:
          BRAI_DEPLOY_HOST: ${{ vars.BRAI_DEPLOY_HOST }}
          BRAI_DEPLOY_USER: ${{ vars.BRAI_DEPLOY_USER }}
          BRAI_DEPLOY_SSH_PORT: ${{ vars.BRAI_DEPLOY_SSH_PORT || '22' }}
          BRAI_DEPLOY_SSH_KEY: ${{ secrets.BRAI_DEPLOY_SSH_KEY }}
          BRAI_BRANCH: ${{ env.BRAI_RELEASE_BRANCH }}
          BRAI_COMMIT: ${{ env.BRAI_RELEASE_COMMIT }}
          BRAI_REQUIRE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          BRAI_CLOSE_OUTCOME: ${{ github.event_name == 'delete' && 'branch_deleted' || github.event_name == 'pull_request' && 'abandoned_closed' || 'released' }}
