    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "world.brightos.brai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode braiAndroidVersionCode
        versionName braiApkVersion
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [braiAppLabel: 'Brai']
        buildConfigField "String", "BRAI_ANDROID_API", "\"${braiAndroidApi}\""
        buildConfigField "String", "BRAI_APK_VERSION", "\"${braiApkVersion}\""
        buildConfigField "String", "BRAI_APK_BUILD_KIND", "\"${braiApkBuildKind}\""
        buildConfigField "int", "BRAI_APK_PREVIEW_ITERATION", "${braiApkPreviewIteration}"
