}

tasks.register('validateBraiAndroidApiBundle') {
    doLast {
        def flavor = braiRequestedNonProductionFlavor()
        if (!flavor) return
        def expectedApi = braiNonProductionAndroidApis[flavor]
        def commandFlavor = flavor.startsWith('preview') ? "preview${flavor[-1].toUpperCase(Locale.ROOT)}" : flavor
        if (braiAndroidApi != expectedApi) {
            throw new GradleException("NEXT_PUBLIC_BRAI_ANDROID_API must be ${expectedApi} for ${commandFlavor} Android builds, got ${braiAndroidApi}. Use deploy/scripts/build-android-env-apk.sh ${commandFlavor}.")
        }

        def assetsDir = file("$projectDir/src/main/assets/public")
        if (!assetsDir.exists()) {
            throw new GradleException("Missing Capacitor web assets for ${commandFlavor}; run deploy/scripts/build-android-env-apk.sh ${commandFlavor}.")
        }
        def runtimeConfigFile = file("$assetsDir/brai-runtime-config.js")
        if (!runtimeConfigFile.exists()) {
            throw new GradleException("Missing runtime config for ${commandFlavor}; run deploy/scripts/build-android-env-apk.sh ${commandFlavor}.")
        }
        def runtimeConfig = runtimeConfigFile.getText('UTF-8')
        if (runtimeConfig.contains(braiProductionAndroidApi)) {
            throw new GradleException("Non-production runtime config contains production API. Rebuild runtime config with NEXT_PUBLIC_BRAI_ANDROID_API=${expectedApi} before Gradle packaging.")
        }
        if (!runtimeConfig.contains(expectedApi)) {
            throw new GradleException("Non-production runtime config does not contain ${expectedApi}. Use deploy/scripts/build-android-env-apk.sh ${commandFlavor}.")
        }
    }
}

tasks.configureEach { task ->
    def taskName = task.name.toLowerCase(Locale.ROOT)
    def packagesNonProductionAndroid = braiNonProductionAndroidApis.keySet().any { flavor -> taskName.contains(flavor) } &&
        (taskName.startsWith('assemble') ||
            taskName.startsWith('bundle') ||
            taskName.startsWith('connected') ||
            taskName.startsWith('package'))
    if (packagesNonProductionAndroid) {
        task.dependsOn('validateBraiAndroidApiBundle')
    }
}

gradle.taskGraph.whenReady { graph ->
    def needsReleaseSigning = graph.allTasks.any { task ->
        def taskName = task.name.toLowerCase()
        task.path.startsWith(':app:')
            && taskName.contains('release')
            && (taskName.startsWith('assemble')
                || taskName.startsWith('bundle')
                || taskName.startsWith('package')
                || taskName.startsWith('sign')
                || taskName.startsWith('validatesigning'))
    }
    if (needsReleaseSigning) {
        if (!androidKeystorePath || !androidStorePassword || !androidKeyAlias || !androidKeyPassword) {
            throw new GradleException("Release APK signing requires BRAI_ANDROID_KEYSTORE_PATH, BRAI_ANDROID_STORE_PASSWORD, BRAI_ANDROID_KEY_ALIAS, and BRAI_ANDROID_KEY_PASSWORD.")
        }
        if (!androidReleaseKeystore.exists()) {
            throw new GradleException("Release APK signing keystore does not exist: ${androidReleaseKeystore}")
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.glance:glance-appwidget:1.2.0-rc01"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.robolectric:robolectric:4.16.1"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
