            buildConfigField "String", "BRAI_APP_BUILD", '"1-a"'
            buildConfigField "String", "BRAI_FALLBACK_BUNDLE_VERSION", "\"${braiWebVersion}\""
            buildConfigField "String", "BRAI_OTA_MANIFEST_URL", '"https://a.test.brightos.world/mobile-update/manifest.json"'
            buildConfigField "String", "BRAI_ENVIRONMENT", '"preview-a"'
            buildConfigField "String", "BRAI_PREVIEW_SLOT", '"A"'
            buildConfigField "String", "BRAI_APK_RELEASE_KEY", '"a"'
            buildConfigField "String", "BRAI_OTA_CHANNEL", '"a.test.brightos.world/mobile-update"'
