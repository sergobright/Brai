import java.util.Locale

apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

def androidKeystorePath = System.getenv('BRAI_ANDROID_KEYSTORE_PATH')
def androidStorePassword = System.getenv('BRAI_ANDROID_STORE_PASSWORD')
def androidKeyAlias = System.getenv('BRAI_ANDROID_KEY_ALIAS')
def androidKeyPassword = System.getenv('BRAI_ANDROID_KEY_PASSWORD') ?: androidStorePassword
def androidReleaseKeystore = file(androidKeystorePath ?: 'missing-release-keystore.jks')
def braiWebVersion = System.getenv('BRAI_APP_VERSION')
if (!braiWebVersion?.trim()) {
    throw new GradleException("BRAI_APP_VERSION is required for Android builds")
}
def braiAndroidApi = System.getenv('NEXT_PUBLIC_BRAI_ANDROID_API') ?: 'https://api.brightos.world'
def braiAndroidVersionCode = (System.getenv('BRAI_ANDROID_VERSION_CODE') ?: '1') as Integer
def braiApkVersion = System.getenv('BRAI_APK_VERSION') ?: "${braiAndroidVersionCode}"
def braiApkBuildKind = System.getenv('BRAI_APK_BUILD_KIND') ?: 'stable'
def braiApkPreviewIteration = (System.getenv('BRAI_APK_PREVIEW_ITERATION') ?: '0') as Integer
def braiAndroidAppLabel = System.getenv('BRAI_ANDROID_APP_LABEL')
def braiPreviewPackageSuffix = braiApkBuildKind == 'preview' ? '.work' : ''
def braiAppLabel = { fallback -> braiAndroidAppLabel ?: fallback }
def braiProductionAndroidApi = 'https://api.brightos.world'
def braiNonProductionAndroidApis = [
    dev: 'https://dev.brightos.world/api',
    previewa: 'https://a.test.brightos.world/api',
    previewb: 'https://b.test.brightos.world/api',
    previewc: 'https://c.test.brightos.world/api',
    previewd: 'https://d.test.brightos.world/api',
    previewe: 'https://e.test.brightos.world/api',
]

def braiRequestedNonProductionFlavor = {
    def requestedTasks = gradle.startParameter.taskNames.join(' ').toLowerCase(Locale.ROOT)
    braiNonProductionAndroidApis.keySet().find { flavor -> requestedTasks.contains(flavor) }
}

