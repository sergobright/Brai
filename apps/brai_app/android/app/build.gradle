            buildConfigField "String", "BRAI_ENVIRONMENT", '"preview-c"'
            buildConfigField "String", "BRAI_PREVIEW_SLOT", '"C"'
            buildConfigField "String", "BRAI_APK_RELEASE_KEY", '"c"'
            buildConfigField "String", "BRAI_OTA_CHANNEL", '"c.test.brightos.world/mobile-update"'
