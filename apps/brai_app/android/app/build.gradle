        }
        previewB {
            dimension "environment"
            applicationIdSuffix ".preview.b${braiPreviewPackageSuffix}"
            manifestPlaceholders = [braiAppLabel: braiAppLabel('Brai B')]
            buildConfigField "String", "BRAI_APP_BUILD", '"1-b"'
            buildConfigField "String", "BRAI_FALLBACK_BUNDLE_VERSION", "\"${braiWebVersion}\""
            buildConfigField "String", "BRAI_OTA_MANIFEST_URL", '"https://b.test.brightos.world/mobile-update/manifest.json"'
            buildConfigField "String", "BRAI_ENVIRONMENT", '"preview-b"'
            buildConfigField "String", "BRAI_PREVIEW_SLOT", '"B"'
            buildConfigField "String", "BRAI_APK_RELEASE_KEY", '"b"'
            buildConfigField "String", "BRAI_OTA_CHANNEL", '"b.test.brightos.world/mobile-update"'
            buildConfigField "String", "BRAI_APP_LABEL", "\"${braiAppLabel('Brai B')}\""
        }
        previewC {
